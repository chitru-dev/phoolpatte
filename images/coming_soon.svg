<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDE8D0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8651A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle petal decorations -->
  <text x="60"  y="120" font-size="56" opacity="0.10" transform="rotate(-20,60,120)">🌸</text>
  <text x="680" y="90"  font-size="64" opacity="0.10" transform="rotate(15,680,90)">🌺</text>
  <text x="30"  y="430" font-size="48" opacity="0.08" transform="rotate(10,30,430)">🌼</text>
  <text x="720" y="440" font-size="52" opacity="0.08" transform="rotate(-12,720,440)">🏵️</text>
  <text x="380" y="55"  font-size="36" opacity="0.07">🌸</text>
  <text x="400" y="490" font-size="36" opacity="0.07">🌺</text>

  <!-- Center flower icon -->
  <circle cx="400" cy="195" r="56" fill="#E8651A" opacity="0.12"/>
  <text x="400" y="218" font-size="54" text-anchor="middle" font-family="serif">🌸</text>

  <!-- "Coming Soon" badge pill -->
  <rect x="272" y="265" width="256" height="40" rx="20" fill="url(#badge)" opacity="0.92"/>
  <text x="400" y="292" font-size="15" font-weight="700" font-family="'DM Sans', Arial, sans-serif"
        fill="#ffffff" text-anchor="middle" letter-spacing="2">COMING SOON</text>

  <!-- Main text -->
  <text x="400" y="348" font-size="18" font-family="'DM Sans', Arial, sans-serif"
        fill="#9A7A5A" text-anchor="middle" opacity="0.8">Photo being updated</text>

  <!-- Brand watermark -->
  <text x="400" y="462" font-size="13" font-family="'DM Sans', Arial, sans-serif"
        fill="#E8651A" text-anchor="middle" opacity="0.55" letter-spacing="1">PhoolPatte</text>

  <!-- Decorative top/bottom border lines -->
  <rect x="0" y="0" width="800" height="5" fill="url(#badge)" opacity="0.7"/>
  <rect x="0" y="495" width="800" height="5" fill="url(#badge)" opacity="0.7"/>
</svg>
